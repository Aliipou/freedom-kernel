name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  rust-check:
    name: Rust — clippy + tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: freedom-kernel

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609
        with:
          workspaces: freedom-kernel

      - name: TCB LOC guard — engine.rs must stay under 500 lines
        run: |
          loc=$(wc -l < src/engine.rs)
          echo "engine.rs: ${loc} lines"
          if [ "$loc" -gt 500 ]; then
            echo "ERROR: engine.rs exceeds 500 LOC (TCB inflation). Current: ${loc}"
            exit 1
          fi

      - name: TCB purity check — no randomness/network/filesystem in engine.rs
        run: |
          if grep -E 'OsRng|rand_core|TcpStream|UdpSocket|File::open|fs::read|fs::write|std::net' src/engine.rs; then
            echo "ERROR: engine.rs contains I/O or randomness (TCB violation)"
            exit 1
          fi

      - name: Clippy — zero-panic policy
        run: |
          cargo clippy --all-targets -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::indexing_slicing \
            -D clippy::panic

      - name: Build (locked)
        run: cargo build --release --locked

  python-test:
    name: Python — lint + tests
    runs-on: ubuntu-24.04
    needs: rust-check
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2f
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust kernel
        working-directory: freedom-kernel
        run: pip install .

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src --ignore-missing-imports

      - name: Test with coverage gate
        run: pytest --cov=freedom_theory --cov-report=term-missing --cov-fail-under=85

  supply-chain:
    name: Supply chain — cargo-deny + audit
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: freedom-kernel

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@34899fc7f6b6b25e2b60b96e53e1df213f5bbb6f
        with:
          manifest-path: freedom-kernel/Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  api-smoke:
    name: API smoke test
    runs-on: ubuntu-24.04
    needs: python-test

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2f
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and install
        working-directory: freedom-kernel
        run: pip install .

      - run: pip install -e ".[dev]"

      - name: Smoke test API
        run: pytest tests/test_api.py -v
